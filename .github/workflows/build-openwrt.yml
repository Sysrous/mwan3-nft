# =========================================================================
#            Build OpenWrt Packages - NFT-MWAN3 & Nixxi (v2 - Fixed)
# =========================================================================
# 运维工程师注释：
# 版本 2 更新日志：
# 1. [修复] 在克隆 feckert/mwan3 之前，强制删除目标文件夹，防止因文件夹已存在而导致的 git clone 失败 (Exit Code 128)。
# 2. [优化] 将 actions/checkout@v3 升级到 actions/checkout@v4，消除 Node.js 20 的弃用警告。
# =========================================================================

name: Build Custom IPK Packages

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository Content
      # [优化] 升级到 v4，解决 Node.js 警告
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone OpenWrt Source Code
      run: git clone https://github.com/openwrt/openwrt.git -b openwrt-23.05 openwrt

    - name: Update and Install Feeds
      run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

    - name: Inject Customizations (The Core Step)
      run: |
        echo "--- Injecting custom packages and modifications ---"
        
        # 1. 删除官方旧版 mwan3
        echo "Removing original mwan3 from feeds..."
        rm -rf openwrt/package/feeds/packages/mwan3

        # [修复] 在克隆前，强制删除可能存在的旧目录，这是解决 Exit Code 128 的关键
        echo "Cleaning up target directory for custom mwan3..."
        rm -rf openwrt/package/mwan3
        
        # 2. 克隆支持 nftables 的新版 mwan3
        echo "Cloning NFT-ready mwan3 from feckert/mwan3..."
        git clone https://github.com/feckert/mwan3.git openwrt/package/mwan3

        # 3. 复制你自己的 luci-app-nixxi
        echo "Copying custom luci-app-nixxi..."
        cp -r $GITHUB_WORKSPACE/luci-app-nixxi openwrt/package/

        echo "--- Customizations applied successfully ---"

    - name: Load Build Config and Download Sources
      run: |
        cp $GITHUB_WORKSPACE/seed.config openwrt/.config
        cd openwrt
        make defconfig
        make download -j$(nproc)

    - name: Build ONLY The Required Packages
      run: |
        cd openwrt
        echo "--- Starting to build packages (mwan3 & luci-app-nixxi) ---"
        make package/mwan3/compile -j$(nproc) V=s
        make package/luci-app-nixxi/compile -j$(nproc) V=s
        echo "--- Package compilation finished ---"

    - name: Organize IPK Files for Upload
      run: |
        mkdir -p ipk_packages
        find openwrt/bin/packages -type f -name "*.ipk" -exec mv {} ipk_packages/ \;
        echo "All .ipk files have been moved to ipk_packages/"
        echo "IPK_PATH=ipk_packages" >> $GITHUB_ENV

    - name: Upload IPK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Final-IPK-Packages
        path: ${{ env.IPK_PATH }}
