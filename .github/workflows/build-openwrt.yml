name: Build OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone OpenWrt Source
      run: git clone https://github.com/openwrt/openwrt.git -b openwrt-23.05 openwrt

    - name: Update Feeds
      run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

    - name: Copy Custom Files
      run: |
        # 从你的仓库根目录，复制 mwan3 和 luci-app-nixxi 到编译目录
        cp -r $GITHUB_WORKSPACE/mwan3 openwrt/package/
        cp -r $GITHUB_WORKSPACE/luci-app-nixxi openwrt/package/
        
    - name: Load Config
      run: |
        cp $GITHUB_WORKSPACE/seed.config openwrt/.config
        cd openwrt
        make defconfig

    - name: Download Packages
      run: cd openwrt && make download -j$(nproc)

    - name: Build Firmware
      run: cd openwrt && make -j$(nproc) V=s

    - name: Organize Files
      run: |
        mkdir -p firmware
        find openwrt/bin/targets -type f -name "*sysupgrade.bin" -o -name "*factory.img" | xargs -I {} mv {} firmware/
        echo "FIRMWARE_PATH=firmware" >> $GITHUB_ENV

    - name: Upload Firmware
      uses: actions/upload-artifact@v3
      with:
        name: OpenWrt-Firmware
        path: ${{ env.FIRMWARE_PATH }}
