name: Build Specific Packages

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone OpenWrt Source
      run: git clone https://github.com/openwrt/openwrt.git -b openwrt-23.05 openwrt

    - name: Update Feeds
      run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

    - name: Copy Custom Files
      run: |
        rm -rf openwrt/package/feeds/packages/mwan3
        cp -r $GITHUB_WORKSPACE/mwan3 openwrt/package/
        cp -r $GITHUB_WORKSPACE/luci-app-nixxi openwrt/package/

    - name: Load Config and Download Prerequisites
      run: |
        cp $GITHUB_WORKSPACE/seed.config openwrt/.config
        cd openwrt
        make defconfig
        make download -j$(nproc)

    - name: Build ONLY the packages
      run: |
        cd openwrt
        make package/mwan3/compile -j$(nproc) V=s
        make package/luci-app-nixxi/compile -j$(nproc) V=s

    - name: Organize IPK files
      run: |
        mkdir -p ipk_packages
        find openwrt/bin/packages -type f -name "*.ipk" -exec mv {} ipk_packages/ \;
        echo "IPK
