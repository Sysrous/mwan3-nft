name: Build mwan3-nft ipk for OpenWrt 24.10

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
            msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs unzip \
            vim wget xmlto xxd zlib1g-dev file

      - name: Clone OpenWrt source
        run: |
          git clone https://github.com/openwrt/openwrt.git -b openwrt-24.10 openwrt
          echo "src-git mwan3nft https://github.com/dl12345/mwan3-nft.git" >> openwrt/feeds.conf.default

      - name: Update feeds
        run: |
          cd openwrt
          rm -rf feeds/packages/net/mwan3
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom config
        run: |
          if [ -f .config ]; then
            cp .config openwrt/.config
          else
            echo "ERROR: .config file not found in repository root."
            ls -la
            exit 1
          fi
          cd openwrt
          make defconfig

      - name: Download sources
        run: |
          cd openwrt
          make download -j$(nproc) V=s

      - name: Build packages
        run: |
          cd openwrt
          make package/mwan3/compile V=s -j$(nproc)
          make package/luci-app-mwan3/compile V=s -j$(nproc)

      - name: Collect ipk
        run: |
          mkdir -p upload
          find openwrt/bin/packages/ -name "*.ipk" | xargs -I {} cp {} upload/ || true
          ls -lah upload

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mwan3-nft-ipk
          path: upload/
